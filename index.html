<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Restore path after GitHub Pages 404 redirect
      (function(l) {
        if (l.search[1] === 'p') {
          var decoded = l.search.slice(1).split('&').reduce(function(q, s) {
            var kv = s.split('=');
            if (kv[0] === 'p') q.path = '/' + kv[1].replace(/~and~/g, '&');
            if (kv[0] === 'q') q.query = '?' + kv[1].replace(/~and~/g, '&');
            return q;
          }, { path: '', query: '' });
          window.history.replaceState(null, null,
            l.pathname.replace(/\/$/, '') + decoded.path + decoded.query + l.hash
          );
        }
      }(window.location));
    </script>
    <link rel="icon" type="image/png" href="/logo-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ישיבת שבילי התורה — מערכת נוכחות</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
